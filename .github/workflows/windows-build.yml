name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt
        run: |
          aqt install-qt windows desktop 6.7.0 win64_msvc2022_64 -O C:\Qt
          echo "C:\Qt\6.7.0\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: bash
        run: |
          export PATH="C:/Qt/6.7.0/msvc2022_64/bin:$PATH"
          qmake -version

      - name: Build
        shell: bash
        run: |
          export PATH="C:/Qt/6.7.0/msvc2022_64/bin:$PATH"
          qmake QtAuthNet.pro -spec win32-msvc
          jom || nmake || mingw32-make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Deploy
        shell: bash
        run: |
          export PATH="C:/Qt/6.7.0/msvc2022_64/bin:$PATH"
          windeployqt --release release/QtAuthNet.exe || echo "done"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Windows-x64
          path: release/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt (GCC)
        run: |
          aqt install-qt linux desktop 6.7.0 linux_gcc_64 -O ${{ github.workspace }}/Qt
          echo "${{ github.workspace }}/Qt/6.7.0/gcc_64/bin" >> $GITHUB_PATH

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure
        shell: bash
        run: |
          export PATH="${{ github.workspace }}/Qt/6.7.0/gcc_64/bin:$PATH"
          qmake -version

      - name: Build
        shell: bash
        run: |
          export PATH="${{ github.workspace }}/Qt/6.7.0/gcc_64/bin:$PATH"
          qmake QtAuthNet.pro
          make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Linux
          path: release/
          retention-days: 30
