name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: fremycompany/install-qt@v3
        with:
          version: "6.7.0"
          tools: "Tools.Mingw64"
          host: "windows"
          target: "desktop"
          arch: "win64_mingw"
          install-deps: true
          cache: true

      - name: Configure
        shell: bash
        run: |
          export PATH="$Qt6_Dir/bin:$PATH"
          qmake -version
          qmake QtAuthNet.pro -spec win32-g++

      - name: Build
        shell: bash
        run: |
          export PATH="$Qt6_Dir/bin:$PATH"
          mingw32-make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Deploy
        shell: bash
        run: |
          export PATH="$Qt6_Dir/bin:$PATH"
          windeployqt --release release/QtAuthNet.exe || echo "windeployqt done"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Windows-x64
          path: release/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: fremycompany/install-qt@v3
        with:
          version: "6.7.0"
          host: "linux"
          target: "desktop"
          arch: "gcc_64"
          install-deps: true
          cache: true

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure
        shell: bash
        run: |
          export PATH="$Qt6_Dir/bin:$PATH"
          qmake -version
          qmake QtAuthNet.pro

      - name: Build
        shell: bash
        run: |
          export PATH="$Qt6_Dir/bin:$PATH"
          make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Linux
          path: release/
          retention-days: 30
