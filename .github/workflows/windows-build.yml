name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: C:\Qt
          key: qt-6102-msvc2022-v3

      - name: Install Qt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: powershell
        run: |
          $env:Path = "$env:QT_BIN_DIR;$env:Path"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          qmake QtAuthNet.pro -spec win32-msvc
          nmake

      - name: Deploy
        if: success()
        shell: bash
        run: |
          export PATH="$QT_ROOT_DIR/bin:$PATH"
          windeployqt --release release/QtAuthNet.dll

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Windows-x64
          path: release/
          retention-days: 30
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Build
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          mkdir -p release
          qmake QtAuthNet.pro
          make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Linux
          path: release/
          retention-days: 30
          if-no-files-found: error
