name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.0
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          qmake -version

      - name: Build
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          qmake QtAuthNet.pro -spec win32-msvc
          jom || nmake || mingw32-make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Deploy
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          windeployqt --release release/ || echo "done"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Windows-x64
          path: release/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (GCC)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.0
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          qmake -version

      - name: Build
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          qmake QtAuthNet.pro
          make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Linux
          path: release/
          retention-days: 30
