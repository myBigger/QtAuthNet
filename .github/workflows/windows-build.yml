name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt (Windows MinGW)
        run: |
          aqt install-qt windows desktop 6.7.0 win64_mingw -O C:\Qt
          echo "C:\Qt\6.7.0\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Qt
        run: |
          qmake -version
          g++ --version

      - name: Configure
        run: qmake QtAuthNet.pro -spec win32-g++

      - name: Build
        run: mingw32-make -j$env:NUMBER_OF_PROCESSORS

      - name: Deploy
        run: |
          windeployqt --release release/QtAuthNet.exe || echo "windeployqt skipped (non-critical)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Windows-x64
          path: release/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt (Linux)
        run: |
          aqt install-qt linux desktop 6.7.0 gcc_64 -O ${{ github.workspace }}/Qt
          echo "${{ github.workspace }}/Qt/6.7.0/gcc_64/bin" >> $GITHUB_PATH

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Verify Qt
        run: qmake -version && g++ --version

      - name: Configure
        run: qmake QtAuthNet.pro

      - name: Build
        run: make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Linux
          path: release/
          retention-days: 30
