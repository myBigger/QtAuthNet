name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          add-to-path: false

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Build
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          mkdir -p release
          qmake QtAuthNet.pro -spec win32-msvc
          nmake /NOLOGO 2>&1 || jom /NOLOGO 2>&1

      - name: Deploy
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          windeployqt --release release/QtAuthNet.dll 2>&1 || echo "done"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Windows-x64
          path: release/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Build
        shell: bash
        run: |
          export PATH="$QT_BIN_DIR:$PATH"
          mkdir -p release
          qmake QtAuthNet.pro
          make -j${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QtAuthNet-Linux
          path: release/
          retention-days: 30
